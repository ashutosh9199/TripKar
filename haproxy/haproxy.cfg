global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

frontend tripkar_frontend
    bind *:80
    
    # Define ACLs based on URL path
    acl is_api path_beg /api
    
    # Route to appropriate backend
    use_backend api_gateway_backend if is_api
    default_backend react_frontend_backend

backend react_frontend_backend
    balance roundrobin
    # REPLACE <NODE_IP> with your Kubernetes Node IP
    # REPLACE <FRONTEND_NODEPORT> with the NodePort of the frontend service
    server k8s-node-1 <NODE_IP>:<FRONTEND_NODEPORT> check
    # Add more servers if you have multiple K8s nodes:
    # server k8s-node-2 <NODE_IP_2>:<FRONTEND_NODEPORT> check

backend api_gateway_backend
    balance roundrobin
    # REPLACE <NODE_IP> with your Kubernetes Node IP
    # REPLACE <API_GATEWAY_NODEPORT> with the NodePort of the api-gateway service
    server k8s-node-1 <NODE_IP>:<API_GATEWAY_NODEPORT> check
    # Add more servers if you have multiple K8s nodes:
    # server k8s-node-2 <NODE_IP_2>:<API_GATEWAY_NODEPORT> check
