apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "search-service.fullname" . }}
spec:
{{- if .Values.gateway.enabled }}
  parentRefs:
  - name: {{ include "search-service.fullname" . }}-gateway
{{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.route.path }}
    backendRefs:
    - name: {{ include "search-service.fullname" . }}
      port: {{ .Values.service.port }}
