apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "payment-service.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ include "payment-service.fullname" . }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: tripkar-api-gateway
  egress:
  - {}
