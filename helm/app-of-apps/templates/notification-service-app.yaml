apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service-{{ .Values.environment }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ashutosh9199/TripKar.git'
    path: helm/charts/notification-service
    targetRevision: {{ .Values.targetRevision }}
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: {{ .Values.environment }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
