apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tripkar-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/ashutosh9199/TripKar.git'
    path: helm/app-of-apps
    targetRevision: main
    helm:
      values: |
        environment: prod
        targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
